name: Uptime CI

on:
  schedule:
    # Verifica a cada 5 minutos (limite mínimo do GitHub Actions)
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_uptime_workflow]

jobs:
  uptime:
    name: Verificar disponibilidade dos serviços
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upptime — Check sites
        uses: upptime/uptime-monitor@master
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
