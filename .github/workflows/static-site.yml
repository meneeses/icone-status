name: Static Site CI

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Reconstrói a cada hora (30 min após o uptime check)
    - cron: "30 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build e publicar página de status
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buscar dados reais do backend
        run: |
          curl -sf --max-time 10 https://api.icone.academy/health -o health-full.json \
            && echo "health-full ok" || echo '{}' > health-full.json
          curl -sf --max-time 5  https://api.icone.academy/health/live -o health-live.json \
            && echo "health-live ok" || echo '{}' > health-live.json
          echo "--- health-full.json ---"
          cat health-full.json

      - name: Gerar HTML da página de status
        run: node .github/scripts/generate-site.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
